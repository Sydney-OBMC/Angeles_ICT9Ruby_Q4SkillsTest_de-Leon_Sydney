<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Form ST</title>
   <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      color: #333;
      background: linear-gradient(45deg, #f5f5f5, #e8e8e8, #d3d3d3, #c0c0c0);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 2rem;
      color: #333;
    }

    .header p {
      margin: 10px 0 0;
      color: #666;
      font-size: 0.9rem;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #666, #999);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      border-color: #666;
      outline: none;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .options label {
      font-size: 0.9rem;
      color: #666;
    }

    .options input[type="checkbox"] {
      margin-right: 5px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
    }

    .button-primary {
      background: #333;
      color: white;
    }

    .button-primary:hover {
      transform: translateY(-2px);
    }

    .button-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .button-secondary:hover {
      background: #e0e0e0;
    }

    .footer {
      margin-top: 20px;
    }

    .footer a {
      color: #666;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css " rel="stylesheet">
</head>
<body>
    <div class="container">
    <header class="header">
      <h1>Welcome to INSERT SCHOOL</h1>
      <p>Please log in to continue</p>
    </header>

    <div class="logo">ST</div>

    <form>
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter here" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>

      <div class="options">
        <label>
          <input type="checkbox" checked /> Stay logged in
        </label>
        <span style="font-size: 0.8rem; color: #999;">Your session will stay active on this device.</span>
      </div>

      <div class="buttons">
        <a href="notebooks.html" class="button button-primary">Login</a>
        <button type="button" class="button button-secondary">Cancel</button>
      </div>

      <div class="footer">
        <a href="#">Forgot username / password?</a>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('username').value = 'caseycutiepie';
    document.getElementById('password').value = 'pasword';
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js "></script>
</body>
</html>
